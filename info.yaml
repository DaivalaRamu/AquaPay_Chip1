# Tiny Tapeout project information
project:
  title:        "Water ATM Controller"
  author:       "Daivala Ramu"
  discord:      ""
  description:  "Coin-based water dispensing system using FSM and flow sensor"
  language:     "Verilog"
  clock_hz:     100000

  tiles: "1x1"

  top_module:  "tt_um_water_atm"

  source_files:
    - "project.v"

pinout:
  # Inputs
  ui[0]: "coin_1"
  ui[1]: "coin_2"
  ui[2]: "coin_5"
  ui[3]: "coin_10"
  ui[4]: "flow_sensor"
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "valve_on"
  uo[1]: "liters_bit0"
  uo[2]: "liters_bit1"
  uo[3]: "liters_bit2"
  uo[4]: "liters_bit3"
  uo[5]: "liters_bit4"
  uo[6]: "liters_bit5"
  uo[7]: "liters_bit6"

  # Bidirectional
  uio[0]: "liters_bit7"
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

yaml_version: 6
