# Tiny Tapeout project information
project:
  title:        "AquaPay Water ATM"
  author:       "DaivalaRamu"
  discord:      ""
  description:  "Coin-operated water dispenser FSM that accepts Rs1/2/5/10 coins and dispenses proportional water volume via valve and flow-sensor feedback"
  language:     "Verilog"
  clock_hz:     100000

  tiles: "1x1"

  top_module:  "tt_um_water_atm"

  source_files:
    - "project.v"

pinout:
  # Inputs
  ui[0]: "coin_1 (Rs 1 coin insert)"
  ui[1]: "coin_2 (Rs 2 coin insert)"
  ui[2]: "coin_5 (Rs 5 coin insert)"
  ui[3]: "coin_10 (Rs 10 coin insert)"
  ui[4]: "flow_sensor (pulse per litre dispensed)"
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "valve_on (1=open, 0=closed)"
  uo[1]: "liters bit 0"
  uo[2]: "liters bit 1"
  uo[3]: "liters bit 2"
  uo[4]: "liters bit 3"
  uo[5]: "liters bit 4"
  uo[6]: "liters bit 5"
  uo[7]: "liters bit 6"

  # Bidirectional
  uio[0]: "liters bit 7 (output)"
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
